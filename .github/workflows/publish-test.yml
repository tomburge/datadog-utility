name: Publish to TestPyPI

# Runs automatically after a successful Test Build on a version tag.
# Can also be triggered manually by supplying the Test Build run ID.
on:
  workflow_run:
    workflows: ["Test Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source-run-id:
        description: "Test Build run ID to download distribution artifact from"
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  publish-to-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ddutil
    permissions:
      id-token: write
      actions: read

    steps:
      - name: Download distribution (from Test Build run)
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.source-run-id || github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
